services:
  web:
    build: ./app
    ports:
      - "5000:5000"

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - redis

  redis:
    build: ./redis
    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

volumes:
  redis-data: